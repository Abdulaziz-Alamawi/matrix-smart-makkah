name: CI

# Matrix Smart Makkah — continuous integration
# Author: Abdulaziz AlAmawi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm run build

  ml:
    name: ML Service (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Smoke import & model training
        run: python -c "from app.models import ModelRegistry; r=ModelRegistry(); r.train_all(); print('models:', len(r.registry_info()))"
